  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"37e2afce-63bc-4522-8b22-82803eaa88a6\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n\n<style>\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { margin: 0; background: #FAFAF8; color: #252A27; font-family: \"Hiragino Kaku Gothic ProN\", \"Hiragino Sans\", \"Yu Gothic\", \"YuGothic\", \"Meiryo\", sans-serif; -webkit-font-smoothing: antialiased; }\n  #hamburger { display: none; }\n  #backdrop { display: none; }\n  @media (max-width: 900px) {\n    #layout { flex-direction: column !important; }\n    #sidebar {\n      position: fixed !important; top: 0 !important; left: 0 !important; bottom: 0 !important;\n      width: 82% !important; max-width: 320px !important; height: 100vh !important; max-height: none !important;\n      z-index: 60 !important; transform: translateX(-100%); transition: transform 0.25s ease;\n      border-right: 1px solid #D1D7D2 !important; border-bottom: none !important; overflow-y: auto !important;\n      box-shadow: 0 0 32px rgba(37,42,39,0.22);\n    }\n    #sidebar.open { transform: translateX(0); }\n    #toc-list { display: flex !important; flex-direction: column !important; gap: 2px !important; }\n    #content { padding: 28px 20px 64px !important; }\n    #hamburger { display: flex !important; }\n    #backdrop.show { display: block !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div id=\"top\" style=\"min-height:100vh;\">\n  <div id=\"layout\" style=\"display:flex; align-items:flex-start; max-width:1200px; margin:0 auto;\">\n\n    <aside id=\"sidebar\" style=\"position:sticky; top:0; width:264px; flex:none; height:100vh; overflow-y:auto; background:#FAFAF8; border-right:1px solid #D1D7D2; padding:28px 20px;\">\n      <div style=\"font-size:12px; letter-spacing:0.14em; color:#66706A; font-weight:700; margin-bottom:4px;\">目次<\u002Fdiv>\n      <div style=\"font-size:15px; color:#38423D; font-weight:700; margin-bottom:18px;\">AI活用プロンプト集<\u002Fdiv>\n      <nav id=\"toc-list\" style=\"display:flex; flex-direction:column; gap:2px;\">\n        <a href=\"#flow\" style=\"display:block; padding:8px 10px; border-radius:7px; color:#38423D; text-decoration:none; font-size:13.5px; line-height:1.4;\" style-hover=\"background:#E7EBE7;\">まずはこの流れで使う<\u002Fa>\n        <a href=\"#ai-types\" style=\"display:block; padding:8px 10px; border-radius:7px; color:#38423D; text-decoration:none; font-size:13.5px; line-height:1.4;\" style-hover=\"background:#E7EBE7;\">4つのAIの使い分け<\u002Fa>\n        <a href=\"#caution\" style=\"display:block; padding:8px 10px; border-radius:7px; color:#E4572E; text-decoration:none; font-size:13.5px; line-height:1.4; font-weight:700;\" style-hover=\"background:#F6E4DE;\">注意事項<\u002Fa>\n        <a href=\"#guide\" style=\"display:block; padding:8px 10px; border-radius:7px; color:#38423D; text-decoration:none; font-size:13.5px; line-height:1.4;\" style-hover=\"background:#E7EBE7;\">迷ったらこれ<\u002Fa>\n        <a href=\"#basic\" style=\"display:block; padding:8px 10px; border-radius:7px; color:#38423D; text-decoration:none; font-size:13.5px; line-height:1.4;\" style-hover=\"background:#E7EBE7;\">よく使う基本プロンプト<\u002Fa>\n        <a href=\"#usecase\" style=\"display:block; padding:8px 10px; border-radius:7px; color:#38423D; text-decoration:none; font-size:13.5px; line-height:1.4;\" style-hover=\"background:#E7EBE7;\">用途別プロンプト<\u002Fa>\n        <a href=\"#setup\" style=\"display:block; margin-top:10px; padding:6px 10px; border-radius:7px; color:#9AA29C; text-decoration:none; font-size:12px; line-height:1.4;\" style-hover=\"background:#E7EBE7;\">初回設定<\u002Fa>\n      <\u002Fnav>\n    <\u002Faside>\n\n    <main id=\"content\" style=\"flex:1 1 auto; min-width:0; max-width:860px; padding:56px 48px 120px;\">\n\n      <!-- 1. HEADER / INTRO -->\n      <section id=\"intro\" style=\"scroll-margin-top:20px; margin-bottom:56px;\">\n        <div style=\"font-size:12px; letter-spacing:0.16em; color:#F28C28; font-weight:700; margin-bottom:12px;\">社内向けAI活用ガイド<\u002Fdiv>\n        <h1 style=\"font-size:38px; line-height:1.2; margin:0 0 20px; color:#38423D; font-weight:800; letter-spacing:0.01em;\">AI活用プロンプト集<\u002Fh1>\n        <p style=\"font-size:16px; line-height:1.9; margin:0; color:#252A27; max-width:640px;\">研修資料で紹介したプロンプトを、業務中にコピーして使いやすいようにまとめたページです。<br>必要なプロンプトをコピーし、内容を自分の業務に合わせて書き換えて使ってください。<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 2. FLOW -->\n      <section id=\"flow\" style=\"scroll-margin-top:20px; margin-bottom:56px;\">\n        <div style=\"display:flex; align-items:baseline; gap:12px; margin-bottom:20px;\">\n          <span style=\"font-size:13px; font-weight:800; color:#F28C28; letter-spacing:0.06em;\">01<\u002Fspan>\n          <h2 style=\"font-size:24px; margin:0; color:#38423D; font-weight:800;\">まずはこの流れで使う<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"background:#E7EBE7; border:1px solid #D1D7D2; border-radius:12px; padding:28px 24px;\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; gap:6px;\">\n            <div style=\"display:flex; align-items:center; gap:12px; background:#FFFFFF; border:1px solid #D1D7D2; border-radius:999px; padding:10px 22px; font-size:15px; font-weight:700; color:#38423D; box-shadow:0 1px 2px rgba(56,66,61,0.06);\"><span style=\"color:#66706A; font-size:13px;\">1<\u002Fspan>相談して、たたき台を作る<\u002Fdiv>\n            <div style=\"color:#66706A; font-size:18px; line-height:1;\">↓<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px; background:#FFFFFF; border:1px solid #D1D7D2; border-radius:999px; padding:10px 22px; font-size:15px; font-weight:700; color:#38423D; box-shadow:0 1px 2px rgba(56,66,61,0.06);\"><span style=\"color:#66706A; font-size:13px;\">2<\u002Fspan>内容を確認する<\u002Fdiv>\n            <div style=\"color:#66706A; font-size:18px; line-height:1;\">↓<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px; background:#38423D; border:1px solid #38423D; border-radius:999px; padding:10px 22px; font-size:15px; font-weight:700; color:#FFFFFF; box-shadow:0 1px 2px rgba(56,66,61,0.12);\"><span style=\"color:#B9C2BC; font-size:13px;\">3<\u002Fspan>仕上げる<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:14px; line-height:1.8; color:#66706A; margin:16px 2px 0;\">多くの業務は、この3つの流れで進められます。迷ったら、まず「相談して、たたき台を作る」プロンプトを使ってください。文章・資料・画面操作・画像・スライドだけ、用途別プロンプトを使います。<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 3. AI TYPES -->\n      <section id=\"ai-types\" style=\"scroll-margin-top:20px; margin-bottom:56px;\">\n        <div style=\"display:flex; align-items:baseline; gap:12px; margin-bottom:20px;\">\n          <span style=\"font-size:13px; font-weight:800; color:#F28C28; letter-spacing:0.06em;\">02<\u002Fspan>\n          <h2 style=\"font-size:24px; margin:0; color:#38423D; font-weight:800;\">4つのAIの使い分け<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; border:1px solid #D1D7D2; border-radius:12px; padding:24px 26px; border-top:4px solid #F28C28; margin-bottom:14px; display:flex; gap:22px; align-items:center; flex-wrap:wrap; box-shadow:0 1px 3px rgba(56,66,61,0.05);\">\n          <div style=\"flex:none;\">\n            <div style=\"font-size:26px; font-weight:800; color:#38423D; line-height:1;\">Claude<\u002Fdiv>\n            <div style=\"display:inline-block; margin-top:10px; background:#F28C28; color:#FFFFFF; border-radius:999px; padding:4px 14px; font-size:12px; font-weight:800; letter-spacing:0.04em;\">基本AI<\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0; flex:1 1 280px; min-width:240px; font-size:15px; line-height:1.9; color:#252A27;\">業務相談、文章作成、資料構成、条件整理、操作質問。<b style=\"color:#38423D;\">まずはClaudeに相談する<\u002Fb>のが基本です。次のNotebookLM・ChatGPT・Geminiは、用途別に使う補助AIです。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:14px; margin-bottom:18px;\">\n          <div style=\"background:#FFFFFF; border:1px solid #D1D7D2; border-radius:12px; padding:22px; border-top:3px solid #66706A;\">\n            <div style=\"font-size:18px; font-weight:800; color:#38423D; margin-bottom:4px;\">NotebookLM<\u002Fdiv>\n            <div style=\"font-size:13px; font-weight:700; color:#66706A; margin-bottom:12px;\">資料を読ませるAI<\u002Fdiv>\n            <p style=\"font-size:14px; line-height:1.8; color:#252A27; margin:0;\">PDF、説明書、仕様書、長い資料の理解に使う<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#FFFFFF; border:1px solid #D1D7D2; border-radius:12px; padding:22px; border-top:3px solid #66706A;\">\n            <div style=\"font-size:18px; font-weight:800; color:#38423D; margin-bottom:4px;\">ChatGPT<\u002Fdiv>\n            <div style=\"font-size:13px; font-weight:700; color:#66706A; margin-bottom:12px;\">画像を作るAI<\u002Fdiv>\n            <p style=\"font-size:14px; line-height:1.8; color:#252A27; margin:0;\">画像生成、画像修正、画像用プロンプト作成に使う<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#FFFFFF; border:1px solid #D1D7D2; border-radius:12px; padding:22px; border-top:3px solid #66706A;\">\n            <div style=\"font-size:18px; font-weight:800; color:#38423D; margin-bottom:4px;\">Gemini<\u002Fdiv>\n            <div style=\"font-size:13px; font-weight:700; color:#66706A; margin-bottom:12px;\">画像・スライド化に使うAI<\u002Fdiv>\n            <p style=\"font-size:14px; line-height:1.8; color:#252A27; margin:0;\">画像生成や、Claudeで作った構成を簡易スライドのたたき台にする用途で使う<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#E7EBE7; border:1px solid #D1D7D2; border-radius:12px; padding:20px 24px;\">\n          <div style=\"font-size:12px; font-weight:800; letter-spacing:0.1em; color:#66706A; margin-bottom:12px;\">合言葉<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:8px; font-size:14.5px; color:#252A27;\">\n            <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"color:#38423D; font-weight:700; min-width:150px;\">まず相談する<\u002Fspan><span style=\"color:#66706A;\">→<\u002Fspan><span style=\"font-weight:800; color:#38423D;\">Claude<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"color:#38423D; font-weight:700; min-width:150px;\">資料を読ませる<\u002Fspan><span style=\"color:#66706A;\">→<\u002Fspan><span style=\"font-weight:800; color:#38423D;\">NotebookLM<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"color:#38423D; font-weight:700; min-width:150px;\">画像を作る<\u002Fspan><span style=\"color:#66706A;\">→<\u002Fspan><span style=\"font-weight:800; color:#38423D;\">ChatGPT または Gemini<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"color:#38423D; font-weight:700; min-width:150px;\">スライド化する<\u002Fspan><span style=\"color:#66706A;\">→<\u002Fspan><span style=\"font-weight:800; color:#38423D;\">Gemini<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 03. CAUTIONS (moved above prompt sections) -->\n      <section id=\"caution\" style=\"scroll-margin-top:20px; margin-bottom:52px;\">\n        <div style=\"display:flex; align-items:baseline; gap:12px; margin-bottom:20px;\">\n          <span style=\"font-size:13px; font-weight:800; color:#E4572E; letter-spacing:0.06em;\">03<\u002Fspan>\n          <h2 style=\"font-size:24px; margin:0; color:#E4572E; font-weight:800;\">注意事項<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"border:2px solid #E4572E; border-radius:12px; overflow:hidden; background:#FFFFFF;\">\n          <div style=\"background:#E4572E; color:#FFFFFF; padding:12px 20px; font-size:15px; font-weight:800;\">かならず確認してください<\u002Fdiv>\n          <div style=\"padding:24px; display:flex; flex-direction:column; gap:24px;\">\n            <div>\n              <div style=\"font-size:15px; font-weight:800; color:#38423D; margin-bottom:12px;\">入力してはいけない情報<\u002Fdiv>\n              <ul style=\"margin:0; padding-left:20px; font-size:14px; line-height:2; color:#252A27; columns:2; column-gap:32px;\">\n                <li>個人情報<\u002Fli>\n                <li>顧客情報<\u002Fli>\n                <li>社外秘情報<\u002Fli>\n                <li>パスワード<\u002Fli>\n                <li>APIキー<\u002Fli>\n                <li>契約書原本<\u002Fli>\n                <li>未公開の財務情報<\u002Fli>\n                <li>実在の顧客名や担当者名<\u002Fli>\n                <li>会社が外部AIへの入力を禁止している情報<\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid #D1D7D2; padding-top:20px;\">\n              <div style=\"font-size:15px; font-weight:800; color:#38423D; margin-bottom:10px;\">スクショ利用時の注意<\u002Fdiv>\n              <p style=\"margin:0; font-size:14px; line-height:1.9; color:#252A27;\">スクショを送る前に、氏名、メールアドレス、顧客名、会社名、ファイル名、通知、URL、ID、パスワード、認証コードが映っていないか確認してください。<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid #D1D7D2; padding-top:20px;\">\n              <div style=\"font-size:15px; font-weight:800; color:#38423D; margin-bottom:10px;\">出力確認の注意<\u002Fdiv>\n              <p style=\"margin:0 0 10px; font-size:14px; line-height:1.9; color:#252A27;\">AIの回答を業務で使う前に、以下を確認してください。<\u002Fp>\n              <ul style=\"margin:0; padding-left:20px; font-size:14px; line-height:2; color:#252A27;\">\n                <li>数字・日付・会社名・制度は正しいか<\u002Fli>\n                <li>情報元や元資料を確認したか<\u002Fli>\n                <li>AIが勝手に補った内容が混ざっていないか<\u002Fli>\n                <li>個人情報・顧客情報・社外秘が入っていないか<\u002Fli>\n                <li>そのまま社内・社外に出して問題ない表現か<\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; margin-top:16px; background:#F4F5F3; border:1px solid #D1D7D2; border-radius:10px; padding:14px 16px;\">\n          <span style=\"color:#66706A; font-weight:800; font-size:12px; flex:none;\">補足<\u002Fspan>\n          <p style=\"margin:0; font-size:13px; line-height:1.85; color:#38423D;\">利用開始前に、各AIの「モデル改善」「学習データ提供」「アクティビティ保存」に関する設定を確認し、可能な限りオフにしてください。ただし、設定をオフにしても、個人情報・顧客情報・社外秘情報を入力してよいわけではありません。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 4-9. PROMPT CARD SECTIONS -->\n      <sc-for list=\"{{ cardSections }}\" as=\"sec\" hint-placeholder-count=\"6\">\n        <section id=\"{{ sec.id }}\" style=\"scroll-margin-top:20px; margin-bottom:52px;\">\n          <div style=\"display:flex; align-items:baseline; gap:12px; margin-bottom:20px;\">\n            <span style=\"font-size:13px; font-weight:800; color:#F28C28; letter-spacing:0.06em;\">{{ sec.num }}<\u002Fspan>\n            <h2 style=\"font-size:24px; margin:0; color:#38423D; font-weight:800;\">{{ sec.title }}<\u002Fh2>\n          <\u002Fdiv>\n          <sc-if value=\"{{ sec.intro }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"font-size:15px; line-height:1.9; color:#252A27; margin:0 2px 20px; max-width:680px;\">{{ sec.intro }}<\u002Fp>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ sec.flow }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:10px; background:#E7EBE7; border:1px solid #D1D7D2; border-radius:12px; padding:20px 22px; margin-bottom:22px;\">\n              <sc-for list=\"{{ sec.flow }}\" as=\"step\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex; align-items:center; gap:10px;\">\n                  <div style=\"background:#FFFFFF; border:1px solid #D1D7D2; border-radius:8px; padding:9px 14px; font-size:13.5px; font-weight:700; color:#38423D;\">{{ step.label }}<\u002Fdiv>\n                  <sc-if value=\"{{ step.arrow }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"color:#66706A; font-size:16px; line-height:1;\">→<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex; flex-direction:column; gap:18px;\">\n            <sc-for list=\"{{ sec.prompts }}\" as=\"item\" hint-placeholder-count=\"2\">\n              <article style=\"background:#FFFFFF; border:1px solid #D1D7D2; border-radius:12px; padding:24px; box-shadow:0 1px 3px rgba(56,66,61,0.05);\">\n                <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:16px; flex-wrap:wrap;\">\n                  <div>\n                    <div style=\"font-size:12px; font-weight:700; color:#66706A; letter-spacing:0.04em; margin-bottom:4px;\">{{ item.name }}<\u002Fdiv>\n                    <div style=\"font-size:19px; font-weight:800; color:#38423D; line-height:1.3;\">{{ item.title }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end;\">\n                    <div style=\"display:inline-flex; align-items:center; gap:6px; background:#E7EBE7; border:1px solid #D1D7D2; border-radius:999px; padding:5px 12px; font-size:12px; font-weight:700; color:#38423D; white-space:nowrap;\">\n                      <span style=\"color:#66706A; font-weight:600;\">おすすめ<\u002Fspan>{{ item.ai }}\n                    <\u002Fdiv>\n                    <button type=\"button\" onclick=\"{{ item.onCopy }}\" style=\"border:none; cursor:pointer; border-radius:8px; padding:8px 18px; font-size:13px; font-weight:700; color:#FFFFFF; font-family:inherit; transition:background 0.15s; background:{{ item.copyBg }}; white-space:nowrap;\" style-hover=\"filter:brightness(0.95);\">{{ item.copyLabel }}<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <p style=\"margin: 8px 0 14px; font-size: 14px; line-height: 1.7; color: #66706A; max-width: 640px\">{{ item.desc }}<\u002Fp>\n                <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:8px;\">\n                  <span style=\"display:inline-flex; align-items:center; gap:6px; background:#FBF0E4; border:1px solid #F2D2AE; border-radius:7px; padding:5px 11px; font-size:12px; font-weight:800; color:#C46A12; letter-spacing:0.02em;\">✎ 書き換える場所<\u002Fspan>\n                  <span style=\"font-size:13px; font-weight:700; color:#38423D;\">{{ item.rewrite }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:11px; font-weight:700; color:#66706A; letter-spacing:0.04em; margin-bottom:6px;\">コピー用プロンプト本文<\u002Fdiv>\n                <div style=\"background: #F4F5F3; border: 1px solid #D1D7D2; border-left: 3px solid #66706A; border-radius: 8px; padding: 16px 18px; font-family: 'SFMono-Regular', Consolas, 'Courier New', monospace; font-size: 12px; line-height: 1.85; color: #252A27; white-space: pre-wrap; word-break: break-word\">{{ item.body }}<\u002Fdiv>\n                <sc-if value=\"{{ item.note }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; gap:10px; margin-top:14px; background:#F6E4DE; border:1px solid #E4572E; border-radius:8px; padding:12px 14px;\">\n                    <span style=\"color:#E4572E; font-weight:800; font-size:13px; flex:none;\">注意<\u002Fspan>\n                    <p style=\"margin:0; font-size:13px; line-height:1.75; color:#38423D; white-space:pre-wrap;\">{{ item.note }}<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Farticle>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ sec.footNote }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; gap:12px; margin-top:18px; background:#F6E4DE; border:1px solid #E4572E; border-radius:10px; padding:16px 18px;\">\n              <span style=\"color:#E4572E; font-weight:800; font-size:14px; flex:none;\">確認<\u002Fspan>\n              <p style=\"margin:0; font-size:13.5px; line-height:1.8; color:#38423D;\">{{ sec.footNote }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsection>\n      <\u002Fsc-for>\n\n      <!-- SETUP (deemphasized, bottom) -->\n      <section id=\"setup\" style=\"scroll-margin-top:20px; margin-bottom:8px;\">\n        <details style=\"border:1px solid #D1D7D2; border-radius:10px; background:#F4F5F3; padding:0;\">\n          <summary style=\"cursor:pointer; list-style:none; padding:16px 20px; font-size:13.5px; font-weight:700; color:#66706A;\">初回設定（研修担当者から案内があった場合のみ）<\u002Fsummary>\n          <div style=\"padding:0 20px 20px;\">\n            <p style=\"margin:0 0 14px; font-size:13px; line-height:1.85; color:#66706A;\">研修担当者から案内があった場合のみ使用してください。通常の業務では、この設定を変更する必要はありません。<\u002Fp>\n            <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:10px;\">\n              <span style=\"font-size:12px; font-weight:700; color:#66706A;\">おすすめ Claude<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:11px; font-weight:700; color:#66706A; letter-spacing:0.04em; margin-bottom:6px;\">コピー用プロンプト本文<\u002Fdiv>\n            <div style=\"background:#FFFFFF; border:1px solid #D1D7D2; border-radius:8px; padding:16px 18px; font-family:'SFMono-Regular', Consolas, 'Courier New', monospace; font-size:12px; line-height:1.85; color:#252A27; white-space:pre-wrap; word-break:break-word;\">{{ setupItem.body }}<\u002Fdiv>\n            <button type=\"button\" onclick=\"{{ setupItem.onCopy }}\" style=\"margin-top:12px; border:1px solid #D1D7D2; cursor:pointer; border-radius:8px; padding:8px 18px; font-size:13px; font-weight:700; color:#38423D; font-family:inherit; background:{{ setupItem.copyBg }};\" style-hover=\"filter:brightness(0.97);\">{{ setupItem.copyLabel }}<\u002Fbutton>\n            <div style=\"display:flex; gap:10px; margin-top:14px; background:#F6E4DE; border:1px solid #E4572E; border-radius:8px; padding:12px 14px;\">\n              <span style=\"color:#E4572E; font-weight:800; font-size:12px; flex:none;\">注意<\u002Fspan>\n              <p style=\"margin:0; font-size:12.5px; line-height:1.75; color:#38423D;\">この設定にも、個人情報・顧客情報・社外秘情報・パスワード・APIキーは入力しないでください。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fsection>\n\n      <!-- 12. FOOTER -->\n      <footer style=\"border-top:1px solid #D1D7D2; padding-top:24px; margin-top:8px;\">\n        <p style=\"margin:0; font-size:13px; color:#66706A; letter-spacing:0.02em;\">社内向けAI活用ガイド｜プロンプト集<\u002Fp>\n      <\u002Ffooter>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- Mobile menu: hamburger (bottom-right) + backdrop -->\n  <div id=\"backdrop\" onclick=\"{{ closeMenu }}\" style=\"position:fixed; inset:0; z-index:55; background:rgba(37,42,39,0.4);\"><\u002Fdiv>\n  <button id=\"hamburger\" type=\"button\" onclick=\"{{ toggleMenu }}\" aria-label=\"目次を開閉\" style=\"position:fixed; bottom:24px; right:24px; z-index:70; width:56px; height:56px; border:none; cursor:pointer; border-radius:14px; background:#38423D; color:#FFFFFF; box-shadow:0 4px 16px rgba(56,66,61,0.3); align-items:center; justify-content:center; flex-direction:column; gap:5px; font-family:inherit;\">\n    <span style=\"display:block; width:22px; height:2px; background:#FFFFFF; border-radius:2px;\"><\u002Fspan>\n    <span style=\"display:block; width:22px; height:2px; background:#FFFFFF; border-radius:2px;\"><\u002Fspan>\n    <span style=\"display:block; width:22px; height:2px; background:#FFFFFF; border-radius:2px;\"><\u002Fspan>\n  <\u002Fbutton>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { copiedId: null };\n\n  copy(id, text) {\n    const done = () => {\n      this.setState({ copiedId: id });\n      clearTimeout(this._t);\n      this._t = setTimeout(() => this.setState(s => (s.copiedId === id ? { copiedId: null } : null)), 1800);\n    };\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(text).then(done).catch(() => { this.fallback(text); done(); });\n    } else {\n      this.fallback(text);\n      done();\n    }\n  }\n\n  fallback(text) {\n    const ta = document.createElement('textarea');\n    ta.value = text;\n    ta.style.position = 'fixed';\n    ta.style.top = '0';\n    ta.style.opacity = '0';\n    document.body.appendChild(ta);\n    ta.focus();\n    ta.select();\n    try { document.execCommand('copy'); } catch (e) {}\n    document.body.removeChild(ta);\n  }\n\n  componentDidMount() {\n    this._links = Array.from(document.querySelectorAll('#toc-list a'));\n    this._links.forEach(a => { a._baseWeight = a.style.fontWeight || '400'; a._baseBg = a.style.background || ''; });\n    this._sections = this._links.map(a => document.getElementById(a.getAttribute('href').slice(1))).filter(Boolean);\n    this._onScroll = () => {\n      if (!this._sections.length) return;\n      let id = this._sections[0].id;\n      for (const s of this._sections) { if (s.getBoundingClientRect().top <= 140) id = s.id; }\n      this._links.forEach(a => {\n        const active = a.getAttribute('href') === '#' + id;\n        a.style.background = active ? '#E7EBE7' : a._baseBg;\n        a.style.fontWeight = active ? '800' : a._baseWeight;\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll, { passive: true });\n    this._onScroll();\n    this._links.forEach(a => a.addEventListener('click', () => this.closeMenu()));\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) {\n      window.removeEventListener('scroll', this._onScroll);\n      window.removeEventListener('resize', this._onScroll);\n    }\n  }\n\n  toggleMenu = () => {\n    const sb = document.getElementById('sidebar');\n    const bd = document.getElementById('backdrop');\n    const open = sb && sb.classList.toggle('open');\n    if (bd) bd.classList.toggle('show', !!open);\n  };\n\n  closeMenu = () => {\n    const sb = document.getElementById('sidebar');\n    const bd = document.getElementById('backdrop');\n    if (sb) sb.classList.remove('open');\n    if (bd) bd.classList.remove('show');\n  };\n\n  get data() {\n    return [\n      {\n        id: 'guide', num: '04', title: '迷ったらこれ',\n        intro: '何から始めればよいか分からないときは、まずこの「相談して、たたき台を作る」プロンプトを使ってください。目的や前提が足りない場合は、Claudeが選択肢で確認します。',\n        prompts: [\n          { id: 'p1', name: 'プロンプト1', title: '相談して、たたき台を作る', ai: 'Claude', rewrite: '1か所',\n            desc: '何から始めればよいか分からないとき、文章・資料・表・チェックリストなどの最初の案を作りたいときに使います。目的や前提が足りない場合は、Claudeが選択肢で確認します。',\n            body: '内容：\\n［ここに、やりたいこと・作りたいもの・確認したいことを入力］\\n\\n上の内容について、まず全体像を整理してください。\\n\\n整理してほしいこと：\\n・目的\\n・相手\\n・使う場面\\n・現時点での私の考え\\n・確認すべき前提\\n・不足している情報\\n・注意すべき点\\n\\n私の考えが不足している場合は、AIが勝手に決めず、候補を出して選ばせてください。\\n\\n不足している情報があれば、先に質問してください。\\n質問は、できるだけ選択肢形式にしてください。\\n1つだけ選ぶものはラジオボタン形式、複数選べるものはチェックボックス形式にしてください。\\n\\n情報がそろったら、確認・修正前提のたたき台を作ってください。\\n\\n作る形式が明確な場合は、その形式で作成してください。\\n作る形式が明確でない場合は、先に適した形式をラジオボタン形式で提案してください。\\n私が選んだあと、その形式でたたき台を作成してください。\\n\\n条件：\\n・あとで人間が確認・修正する前提で作る\\n・完成品として扱わない\\n・入力した内容と、AIが補った内容を分ける\\n・AIが補った推測は「仮置き」と明記する\\n・数字、日付、制度、会社名などは、確認が必要な情報として扱う\\n\\n最後に、「確認が必要な点」をまとめてください。' },\n        ]\n      },\n      {\n        id: 'basic', num: '05', title: 'よく使う基本プロンプト',\n        intro: 'たたき台ができたら、内容を確認し、仕上げる。文章の作成・修正もここにまとめています。',\n        prompts: [\n          { id: 'p2', name: 'プロンプト2', title: '内容を確認する', ai: 'Claude', rewrite: '1か所',\n            desc: 'AIが作った案や自分で作った文章を、そのまま使ってよいか厳しめに確認したいときに使います。上司へ提出する前の確認にも使います。',\n            body: '内容：\\n［ここに、確認してほしい内容を入力］\\n\\nこの内容をそのまま使う前に、問題がないか厳しめに確認してください。\\n\\n確認してほしいこと：\\n・前提に無理がないか\\n・考えが十分に反映されているか\\n・AIの独自解釈や推測が混ざっていないか\\n・抜け漏れがないか\\n・誤解されそうな点がないか\\n・数字、日付、制度、会社名などに確認が必要なものがないか\\n・根拠や出典が必要な情報に、確かな根拠があるか\\n・個人情報、顧客情報、社外秘情報が含まれていないか\\n\\n確認結果は、以下の4つに分けて整理してください。\\n・そのまま使えそうな点\\n・修正した方がよい点\\n・根拠確認が必要な点\\n・自分で判断すべき点\\n\\n最後に、上司に提出する前に確認すべきことを3つ以内でまとめてください。' },\n          { id: 'p3', name: 'プロンプト3', title: '仕上げる', ai: 'Claude', rewrite: 'なし',\n            desc: 'ここまでの会話内容を、メール・案内文・表・チェックリスト・資料構成など、実務で使える完成版として書き出したいときに使います。出力形式が曖昧な場合は、Claudeがラジオボタン形式で候補を出します。',\n            body: 'ここまでの会話内容をもとに、実務でそのまま使える完成版として書き出してください。\\n\\n出力形式がすでに明確な場合は、その形式に合わせて完成版を作成してください。\\n\\n出力形式が明確でない場合は、先に内容に合う出力形式をラジオボタン形式で提案してください。\\n私が選んだあと、その形式で完成版を作成してください。\\n\\n条件：\\n・入力した内容を優先する\\n・AIの独自解釈や推測は本文に混ぜ込まない\\n・目的に合う形に整理する\\n・読み手に伝わりやすい順番にする\\n・不要な重複や回りくどい表現を減らす\\n・そのままコピーして使える本文を先に出す\\n・不明点や確認が必要な点は、本文とは分けて最後にまとめる\\n・数字、日付、会社名、制度、料金などは、確認が必要な情報として扱う\\n・個人情報、顧客情報、社外秘情報が含まれていないか確認する\\n\\n出力は以下の順番にしてください。\\n1. 完成版\\n2. 本文に反映した考え\\n3. AIが補った可能性がある点\\n4. 使う前の確認事項\\n\\n「使う前の確認事項」は3つ以内でまとめてください。' },\n          { id: 'p4', name: 'プロンプト4', title: '文章を作る・整える', ai: 'Claude', rewrite: '1か所',\n            desc: 'メール、案内文、説明文、報告文などを作成・修正したいときに使います。文章の種類や相手が曖昧な場合は、Claudeが選択肢で確認します。',\n            body: '内容：\\n［ここに、文章にしたい内容、または修正したい文章を入力］\\n\\n上の内容をもとに、文章を作成または修正してください。\\n\\n文章の種類・相手・トーン・伝えたい結論が明確な場合は、その内容に合わせて作成してください。\\n\\n文章の種類・相手・トーン・伝えたい結論が明確でない場合は、先にラジオボタン形式で候補を提示してください。\\n私が選んだあと、その内容に合わせて文章を作成または修正してください。\\n\\n確認する項目：\\n・文章の種類：メール文／社内案内文／説明文／報告文／依頼文／お知らせ文／その他\\n・相手：社内／上司／部下／取引先／顧客／参加者／その他\\n・トーン：標準／丁寧／簡潔／やわらかい／かしこまった\\n・伝えたい結論：依頼／共有／報告／お詫び／案内／確認／その他\\n\\n条件：\\n・意図を優先する\\n・意味を変えずに整える\\n・AIが勝手に内容を追加しない\\n・不足している内容は本文に混ぜず、「確認が必要な点」に分ける\\n・分かりやすく、失礼のない表現にする\\n・不要な重複や回りくどい表現を減らす\\n・そのままコピーして使える本文を先に出す\\n・個人情報や顧客情報は入れない\\n\\n最後に、上司や相手に出す前に確認すべき点を3つ以内でまとめてください。' },\n        ]\n      },\n      {\n        id: 'usecase', num: '06', title: '用途別プロンプト',\n        intro: '資料の読み込み・画面操作・画像生成・スライド生成など、特定の用途で使うプロンプトです。必要なときだけ使ってください。',\n        prompts: [\n          { id: 'p5', name: 'プロンプト5', title: '資料を読ませる', ai: 'NotebookLM', rewrite: '1か所',\n            desc: 'PDF、説明書、仕様書、長い資料を要約・整理したいときに使います。',\n            body: '目的：\\n［要約／Q&A作成／チェックリスト作成／重要点の抽出／分かりにくい点の整理 など］\\n\\nアップロードした資料の内容を、上の目的に合わせて整理してください。\\n\\n特に以下を確認してください。\\n・全体の目的\\n・重要なポイント\\n・作業手順\\n・注意点\\n・分かりにくい用語\\n・確認が必要な箇所\\n\\n資料に書かれている内容と、AIが推測した内容を分けてください。\\n資料に根拠がない内容は「資料内では確認できません」と書いてください。' },\n          { id: 'p6', name: 'プロンプト6', title: '画面操作を聞く', ai: 'Claude', rewrite: '1か所',\n            desc: 'ソフトやWeb画面の操作方法、エラー解消、設定変更などを聞きたいときに使います。',\n            body: 'やりたいこと：\\n［ここに、画面で行いたい操作や解決したいことを入力］\\n\\n添付した画面、または上の説明をもとに、目的を達成するにはどうすればよいか教えてください。\\n\\nお願い：\\n・画面のどこを見ればよいか教えてください\\n・次に押すボタンや確認する場所を順番に教えてください\\n・複数の方法がある場合は、初心者向けの方法を優先してください\\n・分からない点があれば、先に質問してください\\n・削除、送信、保存、公開、共有、設定変更など影響が大きい操作の前には、必ず確認ポイントを出してください\\n・不確かな操作は断言せず、確認が必要と書いてください',\n            note: 'スクショを送る前に、氏名・顧客名・メールアドレス・ファイル名・通知・URL・社内情報が映っていないか確認してください。\\n映っている場合は、隠してから使ってください。' },\n          { id: 'p7', name: 'プロンプト7', title: '画像生成の準備をする', ai: 'Claude → ChatGPT / Gemini', rewrite: '1か所',\n            desc: '画像生成の前に、用途・雰囲気・構図などを整理し、ChatGPTまたはGeminiで画像生成するためのプロンプトを作りたいときに使います。',\n            body: '作りたい画像：\\n［ここに、用途やイメージを入力］\\n\\n画像生成に必要な条件を整理してください。\\n\\n私に質問しながら、以下を確認してください。\\n・用途\\n・対象者\\n・伝えたい印象\\n・必ず残したい要素\\n・入れない要素\\n・雰囲気\\n・構図\\n・色\\n・注意点\\n\\n質問は選択肢形式にしてください。\\n\\n整理できたら、ChatGPTまたはGeminiで画像生成するためのプロンプトを作ってください。\\n\\n条件：\\n・画像内には文字を入れない\\n・ロゴ、個人情報、顧客情報を入れない\\n・実在人物に見える表現は避ける\\n・完成品ではなく、編集前提のたたき台として作る\\n・決めた条件と、AIが補った表現を分ける\\n\\n最後に、生成後に確認すべき点をまとめてください。' },\n          { id: 'p8', name: 'プロンプト8', title: 'スライド生成の準備をする', ai: 'Claude → Gemini', rewrite: '1か所',\n            desc: '説明・発表・共有用スライドの構成を作り、Geminiでスライド化するためのプロンプトまで作りたいときに使います。',\n            body: 'スライドにしたい内容：\\n［ここに、スライド化したい内容を入力］\\n\\n上の内容をもとに、説明・発表・共有用スライドの構成を作ってください。\\n\\n不足している情報があれば、先に質問してください。\\n質問は選択肢形式にしてください。\\n\\n特に以下が不明な場合は、必ず確認してください。\\n・目的\\n・対象者\\n・伝えたい結論\\n・ページ数の目安\\n・使う場面\\n・必ず入れたい内容\\n・入れない内容\\n\\n情報がそろったら、以下を作成してください。\\n\\n1. スライド構成\\n・1ページ1テーマにする\\n・話しやすい順番にする\\n・文字を詰め込みすぎない\\n・表、カード、図解にできそうな部分も提案する\\n・必要なページ数を提案する\\n・考えと、AIが補った提案を分ける\\n\\n2. Gemini用プロンプト\\nGeminiに貼り付けてスライド生成するためのプロンプトを作ってください。\\n\\nGemini用プロンプトには、以下の注意も含めてください。\\n・完成品ではなく、編集前提のたたき台として作る\\n・個人情報、顧客情報、社外秘情報を含めない\\n・数字、日付、制度、会社名などは要確認として扱う\\n・見た目が整っていても、内容を確認してから使う\\n・AIが補った内容は、確認が必要な情報として扱う\\n\\n最後に、生成後に確認すべき点をまとめてください。' },\n        ]\n      },\n    ];\n  }\n\n  get setupData() {\n    return {\n      id: 'p0', name: '初回設定', title: '初回設定', ai: 'Claude', rewrite: 'なし',\n      body: '私は、社内業務でClaudeを使います。\\n主な用途は、業務相談、文章作成、資料作成、調べ事、操作方法の確認です。\\n\\n回答するときは、まず結論または大枠を示し、その後に必要な手順・注意点・確認事項を整理してください。\\n\\nただし、重要な成果物を作る場合は、いきなり完成版を出さないでください。\\n先に、目的・相手・使う場面・考え・前提条件を確認してください。\\n\\n前提が足りない場合は、重要な内容だけ先に質問してください。\\n質問するときは、できるだけ選択肢形式にしてください。\\n\\n質問形式は、内容に応じて以下を使い分けてください。\\n・1つだけ選ぶ質問は、ラジオボタン形式\\n・複数選べる質問は、チェックボックス形式\\n・自由入力が必要なものは、記入欄形式\\n\\n考えが不足している場合は、AIが勝手に補わず、候補を提示して選ばせてください。\\n特に、目的、相手、判断軸、伝えたい結論、避けたい表現が不明な場合は確認してください。\\n\\n提案するときは、良い点だけでなく、注意点、見落としやすい点、反対意見、確認すべき点も出してください。\\n\\n数字、日付、制度、会社名、商品情報、料金、法律、出典が必要な情報は、確認が必要な情報として扱ってください。\\n根拠が確認できない内容は断言せず、「要確認」と明記してください。\\n\\n出典や根拠を示す場合は、発行元、資料名、URL、更新日、資料内の該当箇所など、確認できる情報を示してください。\\n根拠を確認できない場合は、推測で出典を作らないでください。\\n\\nAIの独自解釈と、入力した内容を混ぜないでください。\\n入力内容、AIが補った推測、確認が必要な点を分けて示してください。\\n\\n個人情報、顧客情報、社外秘情報、パスワード、APIキーを入力しないよう注意してください。\\n\\n最後に、必要に応じて次に確認すべきことを示してください。',\n    };\n  }\n\n  renderVals() {\n    const cid = this.state.copiedId;\n    const cardSections = this.data.map(sec => ({\n      ...sec,\n      prompts: sec.prompts.map(p => ({\n        ...p,\n        note: p.note || null,\n        copied: cid === p.id,\n        copyLabel: cid === p.id ? 'コピーしました ✓' : 'コピーする',\n        copyBg: cid === p.id ? '#66706A' : '#F28C28',\n        onCopy: () => this.copy(p.id, p.body),\n      })),\n    }));\n    const setup = this.setupData;\n    const setupItem = {\n      ...setup,\n      copyLabel: cid === setup.id ? 'コピーしました ✓' : 'コピーする',\n      copyBg: cid === setup.id ? '#D1D7D2' : '#FFFFFF',\n      onCopy: () => this.copy(setup.id, setup.body),\n    };\n    return { cardSections, setupItem, toggleMenu: this.toggleMenu, closeMenu: this.closeMenu };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
